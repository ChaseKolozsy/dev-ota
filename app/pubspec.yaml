name: devota
description: "Local-first Android OTA and remote development tool"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  path_provider: ^2.1.0
  open_filex: ^4.5.0
  shared_preferences: ^2.3.0
  dartssh2: ^2.18.0
  pinenacl: ^0.6.0
  xterm: ^4.0.0
  flutter_secure_storage: ^10.3.1
  file_picker: ^11.0.2
  record: ^7.1.0
  permission_handler: ^12.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
