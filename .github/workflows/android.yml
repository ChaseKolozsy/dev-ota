name: Android

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Android APKs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Resolve dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build public ARM64 DevOTA APK
        run: ../scripts/build/devota-public-debug.sh

      - name: Verify public package id
        run: |
          AAPT="$(find "$ANDROID_HOME/build-tools" -path '*/aapt' -type f | sort -V | tail -1)"
          "$AAPT" dump badging dist/public/devota-arm64-debug.apk | tee dist/public/devota-arm64-debug.badging.txt
          grep "package: name='io.github.chasekolozsy.devota'" dist/public/devota-arm64-debug.badging.txt

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devota-android-debug-apks
          path: |
            app/dist/public/*.apk
            app/dist/public/*.sha256
            app/dist/public/*.badging.txt
